<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Lab</title>
    <!-- Paint the dark app background from the very first frame, before
         React/Tailwind load. Without this the webview's initial paint is
         the browser-default white, which flashes bright on launch (most
         visible under gamescope / Gaming Mode). Matches the dark theme's
         --background (oklch 0.145 0 0); the hex is a fallback. -->
    <style>
      html,
      body {
        background-color: #18181b;
        background-color: oklch(0.145 0 0);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
